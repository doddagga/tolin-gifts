<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تولين للهدايا | Tolin Gifts</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark); color: #fff; margin: 0; padding: 0; }
        header { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('33744.jpg') center/cover; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        header img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); }
        header h1 { color: var(--gold); margin: 10px 0 5px 0; font-size: 26px; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 20px; flex-wrap: wrap; }
        .filter-btn { background: #252525; border: 1px solid #333; color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: var(--gold); color: #000; font-weight: bold; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--card); border-radius: 12px; border: 1px solid #2a2a2a; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; text-align: center; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-title { font-size: 18px; margin: 10px 0; color: #fff; }
        .product-price { font-size: 16px; color: var(--gold); font-weight: bold; margin-bottom: 15px; }
        .order-btn { display: inline-block; width: 90%; padding: 10px; background: var(--gold); color: #000; text-decoration: none; font-weight: bold; border-radius: 6px; transition: 0.3s; }
        .order-btn:hover { background: #b89227; }
        #loading { text-align: center; color: var(--gold); font-size: 18px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <img src="33744.jpg" alt="شعار تولين">
    <h1>تولين للهدايا - فلسطين</h1>
    <p>توصيل أفخم الهدايا والمجات بكل حب 🎁</p>
</header>

<div class="filters">
    <button class="filter-btn active" onclick="filterCategory('الكل', this)">الكل</button>
    <button class="filter-btn" onclick="filterCategory('مجات', this)">مجات</button>
    <button class="filter-btn" onclick="filterCategory('باقات', this)">باقات</button>
    <button class="filter-btn" onclick="filterCategory('صناديق', this)">صناديق هدايا</button>
</div>

<div id="loading">⏳ جاري تحميل أحدث الهدايا الفخمة...</div>
<div class="products-grid" id="productsContainer"></div>

<script src="script.js"></script>
</body>
</html>
